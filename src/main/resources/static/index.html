<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Заправки каршеринга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Экран входа -->
    <div id="loginView" class="view active">
        <div class="login-bg"></div>
        <div class="login-box">
            <h2>Вход в систему</h2>
            <input type="text" id="loginAcc" placeholder="Аккаунт" class="login-input">
            <input type="password" id="loginPass" placeholder="Пароль" class="login-input">
            <button id="loginBtn" class="login-btn">Войти</button>
            <p id="loginError" class="login-error hidden">Неверный аккаунт или пароль</p>
        </div>
    </div>

    <!-- Карта -->
    <div id="mapView" class="view">
        <div id="map"></div>
        <button id="routeBuilderBtn" class="route-builder-btn" title="Сложный маршрут">🧠</button>
        <button id="locationBtn" class="location-btn">🧭</button>
        <button id="taskLocationBtn" class="task-location-btn hidden">⛽</button>
        <button id="panoramaBtn" class="panorama-btn" title="Панорама">🌐</button>
    </div>

    <!-- Аккаунт -->
    <div id="accountView" class="view">
        <div class="account-container">
            <!-- Новая обёртка с фоновой картинкой -->
            <div class="fuel-background">
                <div class="top-controls">
                    <div class="hardmode-remote">
                        <div class="remote-shell">
                            <button id="hardmodeOnBtn" class="remote-btn on-btn">ON</button>
                            <button id="hardmodeOffBtn" class="remote-btn off-btn active">OFF</button>
                        </div>
                        <span class="hardmode-label">Hardmode</span>
                    </div>
                    <div class="settings-wrapper">
                        <button id="settingsBtn" class="settings-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                            </svg>
                        </button>
                        <div id="settingsMenu" class="settings-menu hidden">
                            <div class="menu-item" id="menuDriver">👤 Иван Петров</div>
                            <div class="menu-item" id="menuTruck">🚛 БелАЗ А123ВС 178</div>
                            <div class="menu-item" id="menuSupport">📞 Поддержка</div>
                            <div class="menu-item" id="menuInstructions">📖 Инструкции</div>
                            <div class="menu-item menu-sos" id="menuSOS">🆘 SOS</div>
                            <div class="menu-item menu-logout" id="menuLogout">🚪 Завершить смену</div>
                        </div>
                    </div>
                </div>
                <div class="tank-carousel" id="tankCarousel">
                    <div class="tank-panel tank-left" data-fuel="ai95">
                        <div class="fuel-tank" id="tankAi95">
                            <div class="fuel-tank-fill" id="fillAi95"></div>
                            <div class="fuel-tank-bubbles" id="bubblesAi95"></div>
                            <span class="fuel-tank-text" id="textAi95">0 л</span>
                        </div>
                        <div class="fuel-label">АИ-95</div>
                    </div>
                    <div class="tank-panel tank-center" data-fuel="ai92">
                        <div class="fuel-tank" id="tankAi92">
                            <div class="fuel-tank-fill" id="fillAi92"></div>
                            <div class="fuel-tank-bubbles" id="bubblesAi92"></div>
                            <span class="fuel-tank-text" id="textAi92">0 л</span>
                        </div>
                        <div class="fuel-label">АИ-92</div>
                    </div>
                    <div class="tank-panel tank-right" data-fuel="dt">
                        <div class="fuel-tank" id="tankDt">
                            <div class="fuel-tank-fill" id="fillDt"></div>
                            <div class="fuel-tank-bubbles" id="bubblesDt"></div>
                            <span class="fuel-tank-text" id="textDt">0 л</span>
                        </div>
                        <div class="fuel-label">ДТ</div>
                    </div>
                </div>
                <div class="refuel-custom">
                    <input type="number" id="customLitersInput" class="custom-liters-input" placeholder="Литры" step="1" min="1">
                    <button id="customRefuelBtn" class="refuel-btn">Пополнить</button>
                </div>
                <div class="refuel-buttons">
                    <button id="refuelA92Btn" class="refuel-btn">Заправить АИ-92</button>
                    <button id="refuelDTBtn" class="refuel-btn">Заправить ДТ</button>
                </div>
            </div>
            <!-- Конец обёртки -->

            <div class="account-stats">
                <div class="stat-item"><span>Заправлено машин</span><strong id="carsRefueled">0</strong></div>
                <div class="stat-item clickable" id="litersDispensedBlock"><span>Слито литров</span><strong id="litersDispensed">0 л</strong></div>
                <div class="stat-item clickable" id="totalNeededBlock"><span>На зоне требуется</span><strong id="totalNeeded">0 л</strong></div>
            </div>
        </div>
    </div>

    <!-- Детали -->
    <div id="detailsPanel" class="details-panel hidden">
        <div class="details-content" id="detailsContent"></div>
    </div>

    <!-- Работа -->
    <div id="workView" class="view">
        <!-- ... содержимое без изменений ... -->
    </div>

    <!-- Панель действий -->
    <div id="actionPanel" class="action-panel hidden">
        <div class="action-buttons">
            <button id="acceptBtn" class="action-btn accept-btn">Взять в работу</button>
            <button id="routeBtn" class="action-btn route-btn">Построить маршрут</button>
            <button id="photoSearchBtn" class="action-btn photo-search-btn">Найти по фото</button>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="segmented-panel" id="bottomPanel" style="display: none;">
        <div class="segmented-control" id="segmentedControl">
            <button class="seg-btn" data-view="mapView">Карта</button>
            <button class="seg-btn active" data-view="accountView">Аккаунт</button>
            <button class="seg-btn work-btn hidden" id="workBtn" data-view="workView">В работе</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
