<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Заправки каршеринга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Вид карты -->
    <div id="mapView" class="view active">
        <div id="map"></div>
    </div>

    <!-- Вид списка заявок -->
    <div id="listView" class="view">
        <div class="list-container">
            <div class="panel-header">
                <span class="sheet-title">Заявки</span>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="active">Срочно</button>
                    <button class="filter-btn" data-filter="in_progress">В работе</button>
                </div>
            </div>
            <div class="request-list" id="request-list"></div>
        </div>
    </div>

    <!-- Нижний таббар -->
    <div class="tabbar">
        <button class="tab-btn active" data-view="mapView">
            <span class="tab-icon">🗺️</span>
            <span class="tab-label">Карта</span>
        </button>
        <button class="tab-btn" data-view="listView">
            <span class="tab-icon">📋</span>
            <span class="tab-label">Заявки</span>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
