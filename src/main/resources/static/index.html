<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Заправки каршеринга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="mapView" class="view active">
        <div id="map"></div>
    </div>

    <div id="listView" class="view">
        <div class="list-container">
            <div class="panel-header">
                <span class="sheet-title">Заявки</span>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="active">Срочно</button>
                    <button class="filter-btn" data-filter="in_progress">В работе</button>
                </div>
            </div>
            <div class="request-list" id="request-list"></div>
        </div>
    </div>

    <div id="workView" class="view">
        <div class="task-container">
            <h3 class="task-title">Выполнение заявки</h3>
            <div class="task-field">
                <label>Фото госномера ДО</label>
                <button id="photoBeforeBtn" class="photo-btn">Выбрать фото</button>
                <input type="file" id="photoBeforeInput" accept="image/*" capture="environment" style="display:none">
            </div>
            <div class="task-field">
                <label>Фото госномера ПОСЛЕ</label>
                <button id="photoAfterBtn" class="photo-btn">Выбрать фото</button>
                <input type="file" id="photoAfterInput" accept="image/*" capture="environment" style="display:none">
            </div>
            <div class="task-field">
                <label>Литраж заправки</label>
                <input type="number" id="litersInput" class="liters-input" placeholder="0.0" step="0.1" min="0">
            </div>
            <div class="task-actions">
                <button id="openDoorsBtn" class="door-btn">Открыть двери</button>
                <button id="closeDoorsBtn" class="door-btn">Закрыть двери</button>
            </div>
            <button id="closeTaskBtn" class="close-task-btn">Закрыть заявку</button>
        </div>
    </div>

    <div id="actionPanel" class="action-panel hidden">
        <div class="action-buttons">
            <button id="acceptBtn" class="action-btn accept-btn">Взять в работу</button>
            <button id="routeBtn" class="action-btn route-btn">Скопировать координаты</button>
        </div>
    </div>

    <div class="segmented-panel">
        <div class="segmented-control" id="segmentedControl">
            <button class="seg-btn active" data-view="mapView">Карта</button>
            <button class="seg-btn" data-view="listView">Заявки</button>
            <button class="seg-btn work-btn hidden" id="workBtn" data-view="workView">В работе</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
