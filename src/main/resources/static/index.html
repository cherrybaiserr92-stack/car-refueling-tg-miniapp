<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Заправки каршеринга СПб</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <span class="header-icon">⛽</span>
            <h1>Заправки СПб</h1>
            <span class="header-city">Ситидрайв</span>
        </header>

        <div id="map"></div>

        <div class="bottom-panel" id="panel">
            <div class="panel-header">
                <span>Заявки</span>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Все</button>
                    <button class="filter-btn" data-filter="active">Низкий бак</button>
                    <button class="filter-btn" data-filter="in_progress">В работе</button>
                </div>
            </div>
            <div class="request-list" id="request-list"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
