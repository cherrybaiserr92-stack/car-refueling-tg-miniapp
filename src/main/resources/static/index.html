<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Заправки каршеринга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="mapView" class="view active">
        <div id="map"></div>
        <button id="locationBtn" class="location-btn">🧭</button>
        <button id="taskLocationBtn" class="task-location-btn hidden">⛽</button>
    </div>

    <div id="accountView" class="view">
        <div class="account-container">
            <div class="settings-wrapper">
                <button id="settingsBtn" class="settings-btn">⚙️</button>
                <div id="settingsMenu" class="settings-menu hidden">
                    <div class="menu-item" id="menuDriver">👤 Иван Петров</div>
                    <div class="menu-item" id="menuTruck">🚛 ГАЗель А123ВС 178</div>
                    <div class="menu-item" id="menuSupport">📞 Поддержка</div>
                    <div class="menu-item" id="menuInstructions">📖 Инструкции</div>
                    <div class="menu-item menu-sos" id="menuSOS">🆘 SOS</div>
                </div>
            </div>

            <!-- Карусель бочек -->
            <div class="tank-carousel" id="tankCarousel">
                <div class="tank-panel tank-left" data-fuel="ai95">
                    <div class="fuel-tank" id="tankAi95">
                        <div class="fuel-tank-fill" id="fillAi95"></div>
                        <div class="fuel-tank-bubbles" id="bubblesAi95"></div>
                        <span class="fuel-tank-text" id="textAi95">0 л</span>
                    </div>
                    <div class="fuel-label">АИ-95</div>
                </div>
                <div class="tank-panel tank-center" data-fuel="ai92">
                    <div class="fuel-tank" id="tankAi92">
                        <div class="fuel-tank-fill" id="fillAi92"></div>
                        <div class="fuel-tank-bubbles" id="bubblesAi92"></div>
                        <span class="fuel-tank-text" id="textAi92">0 л</span>
                    </div>
                    <div class="fuel-label">АИ-92</div>
                </div>
                <div class="tank-panel tank-right" data-fuel="dt">
                    <div class="fuel-tank" id="tankDt">
                        <div class="fuel-tank-fill" id="fillDt"></div>
                        <div class="fuel-tank-bubbles" id="bubblesDt"></div>
                        <span class="fuel-tank-text" id="textDt">0 л</span>
                    </div>
                    <div class="fuel-label">ДТ</div>
                </div>
            </div>

            <!-- Кнопки заправки -->
            <div class="refuel-buttons">
                <button id="refuelA92Btn" class="refuel-btn">Заправить АИ-92</button>
                <button id="refuelDTBtn" class="refuel-btn">Заправить ДТ</button>
            </div>

            <!-- Статистика -->
            <div class="account-stats">
                <div class="stat-item"><span>Заправлено машин</span><strong id="carsRefueled">0</strong></div>
                <div class="stat-item"><span>Слито литров</span><strong id="litersDispensed">0 л</strong></div>
                <div class="stat-item"><span>На зоне требуется</span><strong id="totalNeeded">0 л</strong></div>
            </div>
        </div>
    </div>

    <!-- Вид работы без изменений -->
    <div id="workView" class="view">
        <div class="task-container">
            <h3 class="task-title">Выполнение заявки</h3>
            <div class="task-info" id="taskInfo">
                <div class="info-row"><span>Авто:</span> <strong id="taskCarModel"></strong></div>
                <div class="info-row"><span>Госномер:</span> <strong id="taskPlate"></strong> <button id="copyPlateBtn" class="copy-btn">📋</button></div>
                <div class="info-row"><span>Координаты:</span> <strong id="taskCoords"></strong> <button id="copyCoordsBtn" class="copy-btn">📋</button></div>
                <div class="info-row"><span>Заявка №:</span> <strong id="taskId"></strong></div>
            </div>
            <div class="task-actions">
                <button id="openDoorsBtn" class="door-btn">Открыть двери</button>
                <button id="closeDoorsBtn" class="door-btn">Закрыть двери</button>
            </div>
            <div class="task-field">
                <label>Фото госномера ДО</label>
                <button id="photoBeforeBtn" class="photo-btn">Выбрать фото</button>
                <input type="file" id="photoBeforeInput" accept="image/*" capture="environment" style="display:none">
            </div>
            <div class="task-field">
                <label>Фото госномера ПОСЛЕ</label>
                <button id="photoAfterBtn" class="photo-btn">Выбрать фото</button>
                <input type="file" id="photoAfterInput" accept="image/*" capture="environment" style="display:none">
            </div>
            <div class="task-field">
                <label>Литраж заправки</label>
                <input type="number" id="litersInput" class="liters-input" placeholder="0.0" step="0.1" min="0">
            </div>
            <div class="task-field">
                <label>Комментарий (тех. состояние и др.)</label>
                <textarea id="commentInput" class="comment-input" rows="3" placeholder="Необязательно"></textarea>
            </div>
            <button id="closeTaskBtn" class="close-task-btn">Закрыть заявку</button>
            <button id="cancelTaskBtn" class="cancel-task-btn">Отменить заявку</button>
        </div>
    </div>

    <div id="actionPanel" class="action-panel hidden">
        <div class="action-buttons">
            <button id="acceptBtn" class="action-btn accept-btn">Взять в работу</button>
            <button id="routeBtn" class="action-btn route-btn">Скопировать координаты</button>
            <button id="photoSearchBtn" class="action-btn photo-search-btn">Найти по фото</button>
        </div>
    </div>

    <div class="segmented-panel">
        <div class="segmented-control" id="segmentedControl">
            <button class="seg-btn active" data-view="mapView">Карта</button>
            <button class="seg-btn" data-view="accountView">Аккаунт</button>
            <button class="seg-btn work-btn hidden" id="workBtn" data-view="workView">В работе</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
